# Static site — repo root is the publish folder (no build step)
[build]
  publish = "."
  command = "echo 'AdProfit: static HTML/CSS/JS'"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
